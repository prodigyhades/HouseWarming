<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            background-color: #0B132B; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #E0E1DD; 
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px; 
            box-sizing: border-box;
        }
        img {
            width: 70%; 
            max-width: 750px; 
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        h1 {
            margin-top: 25px;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px; /* Added to keep the name nicely spaced below */
        }
        .signature {
            font-size: 1.2rem;
            color: #8D99AE; /* Slightly softer color for a clean signature look */
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="building.gif" alt="Tom building a house">
        <h1>almost done, just adding the finishing touches :D</h1>
        <p class="signature">- Venky</p>
    </div>

</body>
</html>
